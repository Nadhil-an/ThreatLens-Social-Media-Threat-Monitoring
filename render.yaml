services:
  - type: web
    name: threatlens
    runtime: python
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn threatlens.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: threatlens-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "threatlens.onrender.com" # Update this after first deployment if name changes
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: threatlens-db
    plan: free
